<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 신항 실시간 선석 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--c1:#0c1d33;--c2:#0f2040;--bd:#1a3358;
    --tx:#c8ddf0;--mu:#3f607f;--am:#f5a623;--gr:#22c55e;
      --re:#f04444;--sk:#38bdf8;--or:#f97316;
        --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
        }
        body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
        .app{max-width:520px;margin:0 auto}

        /* 헤더 */
        header{padding:16px;background:var(--c1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
        .h-top{display:flex;justify-content:space-between;align-items:center}
        .h-brand{display:flex;align-items:center;gap:10px}
        .h-ico{font-size:22px}
        .h-title{font-size:15px;font-weight:900;color:#fff}
        .h-sub{font-size:10px;color:var(--mu);font-family:var(--mono);margin-top:2px}
        .h-btns{display:flex;gap:6px;align-items:center}
        .btn-ref{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:transparent;color:var(--am);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .btn-ref.spin{animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .btn-auto{border:1px solid var(--bd);background:transparent;color:var(--mu);font-size:10px;padding:4px 8px;border-radius:12px;cursor:pointer;font-family:var(--sans)}
        .btn-auto.on{border-color:var(--am);color:var(--am)}

        /* 상태 바 */
        .status-bar{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:10px;color:var(--mu);font-family:var(--mono)}
        .dot{width:7px;height:7px;border-radius:50%;background:var(--mu);flex-shrink:0}
        .dot.live{background:var(--gr);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
        .dot.fail{background:var(--re)}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 6px rgba(34,197,94,.04)}}

        /* 집계 */
        .summary{display:flex;gap:0;margin-top:10px;background:var(--c2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
        .sum-item{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--bd)}
        .sum-item:last-child{border-right:none}
        .sum-num{font-family:var(--mono);font-size:16px;font-weight:700;display:block}
        .sum-lbl{font-size:9px;color:var(--mu);display:block;margin-top:1px}
        .planned-num{color:var(--sk)}
        .berthed-num{color:var(--am)}
        .working-num{color:var(--gr)}
        .departed-num{color:var(--mu)}

        /* 메인 */
        main{padding:12px}
        .progress-bar{height:2px;background:var(--bd);margin-bottom:10px;border-radius:2px;overflow:hidden}
        .progress-fill{height:100%;background:var(--am);border-radius:2px;transition:width .4s;width:0%}

        /* 터미널 섹션 */
        .term-section{margin-bottom:16px}
        .term-header{
          display:flex;align-items:center;gap:8px;
            padding:10px 12px;background:var(--c1);
              border:1px solid var(--bd);border-radius:10px 10px 0 0;
                cursor:pointer;user-select:none;
                }
                .term-pill{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid;flex-shrink:0;min-width:48px;text-align:center}
                .term-name{flex:1;font-size:13px;font-weight:700;color:#fff}
                .term-pier{font-size:10px;color:var(--mu)}
                .term-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid;flex-shrink:0}
                .bg-loading{background:rgba(56,189,248,.08);color:var(--sk);border-color:rgba(56,189,248,.2)}
                .bg-live{background:rgba(34,197,94,.08);color:var(--gr);border-color:rgba(34,197,94,.2)}
                .bg-fail{background:rgba(240,68,68,.07);color:#f07070;border-color:rgba(240,68,68,.2)}
                .bg-empty{background:rgba(63,96,127,.1);color:var(--mu);border-color:var(--bd)}

                .term-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;background:var(--bg)}

                /* 선박 행 */
                .vessel-row{
                  display:flex;align-items:stretch;
                    border-bottom:1px solid var(--bd);
                      transition:background .15s;
                      }
                      .vessel-row:last-child{border-bottom:none}
                      .vessel-row:hover{background:rgba(255,255,255,.02)}

                      .status-bar-left{
                        width:4px;flex-shrink:0;
                        }
                        .status-PLANNED .status-bar-left{background:var(--sk)}
                        .status-BERTHED .status-bar-left{background:var(--am)}
                        .status-WORKING .status-bar-left{background:var(--gr)}
                        .status-DEPARTED .status-bar-left{background:var(--mu)}

                        .vessel-content{flex:1;padding:10px 12px}
                        .vessel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
                        .vessel-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
                        .status-chip{
                          font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
                            flex-shrink:0;border:1px solid;white-space:nowrap;
                            }
                            .chip-PLANNED{background:rgba(56,189,248,.1);color:var(--sk);border-color:rgba(56,189,248,.25)}
                            .chip-BERTHED{background:rgba(245,166,35,.1);color:var(--am);border-color:rgba(245,166,35,.25)}
                            .chip-WORKING{background:rgba(34,197,94,.1);color:var(--gr);border-color:rgba(34,197,94,.25)}
                            .chip-DEPARTED{background:rgba(100,116,136,.1);color:var(--mu);border-color:var(--bd)}

                            .vessel-info{display:grid;grid-template-columns:1fr 1fr;gap:5px}
                            .v-cell{background:var(--c2);border:1px solid var(--bd);border-radius:5px;padding:5px 8px}
                            .v-cell-lbl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
                            .v-cell-val{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--sk)}
                            .v-cell-val.etd{color:var(--am)}
                            .v-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
                            .v-chip{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--mu)}

                            /* 빈/오류 */
                            .t-msg{text-align:center;padding:20px;color:var(--mu);font-size:12px}
                            .t-msg .ico{font-size:24px;margin-bottom:8px}

                            /* 스켈레톤 */
                            .skel{padding:12px;border-bottom:1px solid var(--bd);animation:shim 1.5s infinite}
                            .sl{height:8px;background:var(--bd);border-radius:4px;margin-bottom:6px}
                            .sl.s{width:30%}.sl.m{width:55%}.sl.f{width:85%}
                            @keyframes shim{0%,100%{opacity:1}50%{opacity:.4}}

                            /* 닫힘 상태 */
                            .term-body.collapsed{display:none}
                            .term-chevron{font-size:11px;color:var(--mu);transition:transform .3s}
                            .term-header.open .term-chevron{transform:rotate(180deg)}
                            </style>
                            </head>
                            <body>
                            <div class="app">

                            <header>
                              <div class="h-top">
                                  <div class="h-brand">
                                        <span class="h-ico">⚓</span>
                                              <div>
                                                      <div class="h-title">부산 신항 실시간 선석 현황</div>
                                                              <div class="h-sub" id="h-time">연결 중...</div>
                                                                    </div>
                                                                        </div>
                                                                            <div class="h-btns">
                                                                                  <button class="btn-auto" id="btn-auto" onclick="toggleAuto()">⏱ AUTO</button>
                                                                                        <button class="btn-ref" id="btn-ref" onclick="loadAll()" title="새로고침">↻</button>
                                                                                            </div>
                                                                                              </div>
                                                                                                <div class="status-bar">
                                                                                                    <div class="dot" id="h-dot"></div>
                                                                                                        <span id="h-status">시스템 준비 중</span>
                                                                                                          </div>
                                                                                                            <div class="summary">
                                                                                                                <div class="sum-item"><span class="sum-num planned-num" id="s-planned">-</span><span class="sum-lbl">PLANNED</span></div>
                                                                                                                    <div class="sum-item"><span class="sum-num berthed-num" id="s-berthed">-</span><span class="sum-lbl">BERTHED</span></div>
                                                                                                                        <div class="sum-item"><span class="sum-num working-num" id="s-working">-</span><span class="sum-lbl">WORKING</span></div>
                                                                                                                            <div class="sum-item"><span class="sum-num departed-num" id="s-departed">-</span><span class="sum-lbl">DEPARTED</span></div>
                                                                                                                              </div>
                                                                                                                              </header>

                                                                                                                              <main id="main">
                                                                                                                                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                                                                                                                                  <div id="content"></div>
                                                                                                                                  </main>

                                                                                                                                  </div>
                                                                                                                                  <script>
                                                                                                                                  const TERMS = [
                                                                                                                                    {id:'pnit',name:'PNIT',full:'부산신항국제터미널',pier:'1부두',col:'#06b6d4'},
                                                                                                                                      {id:'pnc', name:'PNC', full:'부산신항만(주)',      pier:'2부두',col:'#3b82f6'},
                                                                                                                                        {id:'hjnc',name:'HJNC',full:'한진부산컨테이너',    pier:'3부두',col:'#f59e0b'},
                                                                                                                                          {id:'hpnt',name:'HPNT',full:'현대부산신항만',       pier:'4부두',col:'#10b981'},
                                                                                                                                            {id:'bnct',name:'BNCT',full:'(주)비엔씨티',        pier:'5부두',col:'#8b5cf6'},
                                                                                                                                              {id:'bct', name:'BCT', full:'부산컨테이너터미널',   pier:'6부두',col:'#ef4444'},
                                                                                                                                                {id:'dgt', name:'DGT', full:'동원글로벌터미널',     pier:'7부두',col:'#f97316'},
                                                                                                                                                  {id:'bnmt',name:'BNMT',full:'부산신항다목적터미널', pier:'다목적',col:'#64748b'},
                                                                                                                                                  ];

                                                                                                                                                  let autoTimer=null, autoOn=false, doneCount=0;
                                                                                                                                                  const $=id=>document.getElementById(id);
                                                                                                                                                  const safe=s=>{const d=document.createElement('div');d.textContent=String(s||'-');return d.innerHTML};
                                                                                                                                                  const pad=n=>String(n).padStart(2,'0');
                                                                                                                                                  const fmtNow=()=>{const d=new Date();return`${pad(d.getHours())}:${pad(d.getMinutes())} 업데이트`};

                                                                                                                                                  function statusLabel(s){
                                                                                                                                                    const m={PLANNED:'입항예정',BERTHED:'접안',WORKING:'작업중',DEPARTED:'출항'};
                                                                                                                                                      return m[s]||s||'-';
                                                                                                                                                      }

                                                                                                                                                      function renderTerminal(t,res){
                                                                                                                                                        const {status,vessels=[],error}=res;
                                                                                                                                                          const badge = status==='live'?`bg-live ✓ ${vessels.length}척`
                                                                                                                                                              :status==='fail'?'bg-fail 수집실패'
                                                                                                                                                                  :status==='empty'?'bg-empty 정보없음'
                                                                                                                                                                      :'bg-loading 수집중';
                                                                                                                                                                        const [bc,...bl]=badge.split(' ');

                                                                                                                                                                          let body='';
                                                                                                                                                                            if(status==='live'&&vessels.length){
                                                                                                                                                                                body=vessels.map((v,i)=>{
                                                                                                                                                                                      const sc=v.status||'UNKNOWN';
                                                                                                                                                                                            const chips=[
                                                                                                                                                                                                    v.owner&&v.owner!=='-'?`<span class="v-chip">🏢 ${safe(v.owner)}</span>`:'',
                                                                                                                                                                                                            v.berth&&v.berth!=='-'?`<span class="v-chip">⚓ ${safe(v.berth)}</span>`:'',
                                                                                                                                                                                                                  ].filter(Boolean).join('');
                                                                                                                                                                                                                        return`<div class="vessel-row status-${sc}" style="animation-delay:${i*30}ms">
                                                                                                                                                                                                                                <div class="status-bar-left"></div>
                                                                                                                                                                                                                                        <div class="vessel-content">
                                                                                                                                                                                                                                                  <div class="vessel-top">
                                                                                                                                                                                                                                                              <div class="vessel-name">${safe(v.name)}</div>
                                                                                                                                                                                                                                                                          <div class="status-chip chip-${sc}">${statusLabel(sc)}</div>
                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                              <div class="vessel-info">
                                                                                                                                                                                                                                                                                                          <div class="v-cell"><div class="v-cell-lbl">▼ ETA</div><div class="v-cell-val">${safe(v.eta)}</div></div>
                                                                                                                                                                                                                                                                                                                      <div class="v-cell"><div class="v-cell-lbl">▲ ETD</div><div class="v-cell-val etd">${safe(v.etd)}</div></div>
                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                          ${chips?`<div class="v-meta">${chips}</div>`:''}
                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                        </div>`;
                                                                                                                                                                                                                                                                                                                                                            }).join('');
                                                                                                                                                                                                                                                                                                                                                              } else if(status==='fail'){
                                                                                                                                                                                                                                                                                                                                                                  body=`<div class="t-msg"><div class="ico">🔗</div>자동 수집이 차단되었습니다</div>`;
                                                                                                                                                                                                                                                                                                                                                                    } else if(status==='empty'){
                                                                                                                                                                                                                                                                                                                                                                        body=`<div class="t-msg"><div class="ico">🔍</div>조회된 선박이 없습니다</div>`;
                                                                                                                                                                                                                                                                                                                                                                          } else if(status==='nourl'){
                                                                                                                                                                                                                                                                                                                                                                              body=`<div class="t-msg"><div class="ico">🚧</div>준비 중입니다</div>`;
                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                    body=`<div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>
                                                                                                                                                                                                                                                                                                                                                                                              <div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                  const sec=$(`sec-${t.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                    if(sec){
                                                                                                                                                                                                                                                                                                                                                                                                        sec.querySelector('.term-badge').className=`term-badge ${bc}`;
                                                                                                                                                                                                                                                                                                                                                                                                            sec.querySelector('.term-badge').textContent=bl.join(' ');
                                                                                                                                                                                                                                                                                                                                                                                                                sec.querySelector('.term-body').innerHTML=body;
                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                  function buildSections(){
                                                                                                                                                                                                                                                                                                                                                                                                                    $('content').innerHTML=TERMS.map(t=>`
                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="term-section" id="sec-${t.id}">
                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="term-header open" onclick="toggleSection('${t.id}')">
                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="term-pill" style="color:${t.col};border-color:${t.col}25;background:${t.col}14">${t.name}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                              <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="term-name">${t.full}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="term-pier">${t.pier}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div style="flex:1"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="term-badge bg-loading" id="badge-${t.id}">⟳ 수집중</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="term-chevron">▾</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="term-body" id="body-${t.id}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>`).join('');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function toggleSection(id){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const hdr=document.querySelector(`#sec-${id} .term-header`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const body=$(`body-${id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              hdr.classList.toggle('open');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body.classList.toggle('collapsed');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function loadAll(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  doneCount=0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    $('btn-ref').classList.add('spin');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      $('h-dot').className='dot';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        $('h-status').textContent='전체 부두 수집 중...';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          $('h-time').textContent='요청 중...';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            $('progress-fill').style.width='0%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              $('s-planned').textContent='-';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                $('s-berthed').textContent='-';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  $('s-working').textContent='-';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    $('s-departed').textContent='-';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // 스켈레톤 리셋
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        TERMS.forEach(t=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const badge=$(`badge-${t.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(badge){badge.className='term-badge bg-loading';badge.textContent='⟳ 수집중';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const body=$(`body-${t.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(body) body.innerHTML=`<div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div><div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            try{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const r=await fetch('/api/all');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const res=await r.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(!res.ok) throw new Error('API 오류');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let planned=0,berthed=0,working=0,departed=0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                res.data.forEach(item=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const t=TERMS.find(x=>x.id===item.id);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(!t) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // 배지 업데이트
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const badge=$(`badge-${item.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if(badge){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(item.status==='live'){badge.className='term-badge bg-live';badge.textContent=`✓ ${item.vessels.length}척`;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              else if(item.status==='fail'){badge.className='term-badge bg-fail';badge.textContent='수집실패';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else if(item.status==='empty'){badge.className='term-badge bg-empty';badge.textContent='정보없음';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              else if(item.status==='nourl'){badge.className='term-badge bg-empty';badge.textContent='준비중';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // 바디 업데이트
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const body=$(`body-${item.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(body){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const vessels=item.vessels||[];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(item.status==='live'&&vessels.length){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body.innerHTML=vessels.map((v,i)=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const sc=v.status||'UNKNOWN';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const chips=[
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      v.owner&&v.owner!=='-'?`<span class="v-chip">🏢 ${safe(v.owner)}</span>`:'',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    v.berth&&v.berth!=='-'?`<span class="v-chip">⚓ ${safe(v.berth)}</span>`:'',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ].filter(Boolean).join('');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return`<div class="vessel-row status-${sc}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="status-bar-left"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="vessel-content">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="vessel-top">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="vessel-name">${safe(v.name)}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="status-chip chip-${sc}">${statusLabel(sc)}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
