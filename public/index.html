<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 신항 통합 선석표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--c1:#0c1d33;--c2:#0f2040;--bd:#1a3358;
  --tx:#c8ddf0;--mu:#3f607f;--am:#f5a623;--gr:#22c55e;
  --re:#f04444;--sk:#38bdf8;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{padding:18px 16px 14px;background:var(--c1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.h-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.h-brand{display:flex;align-items:center;gap:10px}
.h-ico{font-size:24px}
.h-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px}
.h-sub{font-size:10px;color:var(--mu);font-family:var(--mono);margin-top:2px}
.h-btns{display:flex;gap:7px;align-items:center}
.btn-auto{border:1px solid var(--bd);background:transparent;color:var(--mu);font-size:10px;padding:5px 9px;border-radius:14px;cursor:pointer;font-family:var(--sans);transition:all .2s;white-space:nowrap}
.btn-auto.on{border-color:var(--am);color:var(--am)}
.btn-ref{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:transparent;color:var(--am);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-ref:hover{background:var(--bd)}
.btn-ref.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.h-status{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:10px;color:var(--mu);font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mu);flex-shrink:0;transition:background .3s}
.dot.live{background:var(--gr);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
.dot.fail{background:var(--re)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 7px rgba(34,197,94,.04)}}
.h-stats{display:flex;margin-top:12px;background:var(--c2);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
.st-item{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--bd)}
.st-item:last-child{border-right:none}
.st-num{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--am);display:block}
.st-lbl{font-size:9px;color:var(--mu);display:block;margin-top:1px}
main{padding:12px 12px 40px}
.progress-bar{height:2px;background:var(--bd);margin-bottom:10px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--am);border-radius:2px;transition:width .4s ease;width:0%}
.t-block{border:1px solid var(--bd);border-radius:11px;margin-bottom:10px;overflow:hidden;transition:border-color .25s}
.t-block:hover{border-color:rgba(245,166,35,.25)}
.t-hdr{display:flex;align-items:center;gap:9px;padding:12px 13px;background:var(--c1);cursor:pointer;user-select:none;transition:background .2s}
.t-hdr:hover{background:var(--c2)}
.t-pill{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid;flex-shrink:0;min-width:48px;text-align:center}
.t-info{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-pier{font-size:10px;color:var(--mu);margin-top:1px}
.t-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:11px;flex-shrink:0;border:1px solid;white-space:nowrap}
.bg-wait{background:rgba(63,96,127,.1);color:var(--mu);border-color:var(--bd)}
.bg-loading{background:rgba(56,189,248,.08);color:var(--sk);border-color:rgba(56,189,248,.2)}
.bg-live{background:rgba(34,197,94,.08);color:var(--gr);border-color:rgba(34,197,94,.2)}
.bg-fail{background:rgba(240,68,68,.07);color:#f07070;border-color:rgba(240,68,68,.2)}
.bg-empty{background:rgba(63,96,127,.12);color:var(--mu);border-color:var(--bd)}
.t-chev{font-size:12px;color:var(--mu);transition:transform .3s;flex-shrink:0}
.t-hdr.open .t-chev{transform:rotate(180deg)}
.t-body{max-height:0;overflow:hidden;transition:max-height .4s ease;background:var(--bg)}
.t-body.open{max-height:3000px}
.t-body-in{padding:10px}
.t-elapsed{font-size:9px;color:var(--mu);text-align:right;margin-bottom:6px;font-family:var(--mono)}
.v-card{background:var(--c1);border:1px solid var(--bd);border-radius:9px;padding:13px;margin-bottom:8px;animation:fadeUp .2s ease forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.v-top{display:flex;justify-content:space-between;align-items:flex-start;gap:7px;margin-bottom:9px}
.v-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.v-vvd{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;background:rgba(245,166,35,.1);color:var(--am);border:1px solid rgba(245,166,35,.2)}
.v-times{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.v-t{background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:7px 9px}
.v-t-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.v-t-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--sk)}
.v-t-val.etd{color:var(--am)}
.v-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.v-chip{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--mu)}
.t-msg{text-align:center;padding:22px 14px}
.t-msg .m-ico{font-size:28px;margin-bottom:8px}
.t-msg p{font-size:12px;color:var(--mu);line-height:1.7}
.link-btn{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:8px 16px;border-radius:18px;border:1px solid var(--bd);background:transparent;color:var(--tx);font-size:11px;cursor:pointer;font-family:var(--sans);text-decoration:none;transition:all .2s}
.link-btn:hover{background:var(--c1);border-color:var(--am);color:var(--am)}
.skel{background:var(--c1);border:1px solid var(--bd);border-radius:9px;padding:13px;margin-bottom:8px;animation:shim 1.5s infinite}
.sl{height:9px;background:var(--bd);border-radius:4px;margin-bottom:7px}
.sl.s{width:30%}.sl.m{width:55%}.sl.f{width:90%}
@keyframes shim{0%,100%{opacity:1}50%{opacity:.4}}
.footer-note{font-size:10px;color:#1e3550;text-align:center;padding:6px 14px 0;line-height:1.7}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="h-top">
    <div class="h-brand">
      <span class="h-ico">⚓</span>
      <div>
        <div class="h-title">부산 신항 통합 선석표</div>
        <div class="h-sub" id="h-time">서버 연결 중...</div>
      </div>
    </div>
    <div class="h-btns">
      <button class="btn-auto" id="btn-auto" onclick="toggleAuto()">⏱ AUTO</button>
      <button class="btn-ref" id="btn-ref" onclick="loadAll()" title="새로고침">↻</button>
    </div>
  </div>
  <div class="h-status">
    <div class="dot" id="h-dot"></div>
    <span id="h-status">시스템 준비 중</span>
  </div>
  <div class="h-stats">
    <div class="st-item"><span class="st-num" id="s-all">8</span><span class="st-lbl">전체 부두</span></div>
    <div class="st-item"><span class="st-num" id="s-live">-</span><span class="st-lbl">데이터 수집</span></div>
    <div class="st-item"><span class="st-num" id="s-ship">-</span><span class="st-lbl">총 선박</span></div>
    <div class="st-item"><span class="st-num" id="s-prog">0%</span><span class="st-lbl">완료</span></div>
  </div>
</header>
<main id="main">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</main>
</div>
<script>
const TERMS_META=[
  {id:'pnc',name:'PNC',full:'부산신항만(주)',pier:'1부두',col:'#3b82f6',direct:'https://svc.pncport.com/info/CMS/Ship/Info.pnc?mCode=MN014'},
  {id:'pnit',name:'PNIT',full:'부산신항국제터미널',pier:'2부두',col:'#06b6d4',direct:'https://www.pnitl.com/infoservice/vessel/vslScheduleList.jsp'},
  {id:'hjnc',name:'HJNC',full:'한진부산컨테이너터미널',pier:'3부두',col:'#f59e0b',direct:'https://www.hjnc.co.kr/esvc/vessel/berthScheduleT'},
  {id:'hpnt',name:'HPNT',full:'현대부산신항만(HMM)',pier:'4부두',col:'#10b981',direct:'https://www.hpnt.co.kr/infoservice/vessel/vslScheduleList.jsp'},
  {id:'bnct',name:'BNCT',full:'(주)비엔씨티',pier:'5부두',col:'#8b5cf6',direct:'http://info.bnctkorea.com/esvc/vessel/berthScheduleT'},
  {id:'bct',name:'BCT',full:'부산컨테이너터미널',pier:'6부두',col:'#ef4444',direct:'https://info.bct2-4.com/'},
  {id:'dgt',name:'DGT',full:'동원글로벌터미널부산',pier:'7부두',col:'#f97316',direct:'https://info.dgtbusan.com/DGT/esvc/vessel/berthScheduleT'},
  {id:'bnmt',name:'BNMT',full:'부산신항다목적터미널',pier:'다목적부두',col:'#64748b',direct:null},
];
let autoTimer=null,autoOn=false,doneCount=0,liveCount=0,shipTotal=0;
const $=id=>document.getElementById(id);
const safe=s=>{const d=document.createElement('div');d.textContent=String(s||'-');return d.innerHTML};
const pad=n=>String(n).padStart(2,'0');
const fmtNow=()=>{const d=new Date();return`${pad(d.getHours())}:${pad(d.getMinutes())}`};
async function loadAll(){
  doneCount=0;liveCount=0;shipTotal=0;
  $('s-live').textContent='-';$('s-ship').textContent='-';$('s-prog').textContent='0%';
  $('btn-ref').classList.add('spin');
  $('h-dot').className='dot';
  $('h-status').textContent='8개 부두 수집 중...';
  $('h-time').textContent='요청 중...';
  const pf=$('progress-fill');if(pf)pf.style.width='0%';
  TERMS_META.forEach(t=>{setBadge(t.id,'loading','⟳ 수집중');setSkel(t.id)});
  try{
    const r=await fetch('/api/all');
    const res=await r.json();
    if(!res.ok)throw new Error('API 오류');
    res.data.forEach(item=>{
      const meta=TERMS_META.find(t=>t.id===item.id);
      if(meta)renderResult(meta,item);
    });
    $('btn-ref').classList.remove('spin');
    $('h-time').textContent=`${fmtNow()} 업데이트 완료`;
    $('h-dot').className=liveCount>0?'dot live':'dot fail';
    $('h-status').textContent=liveCount>0?`${liveCount}개 부두 수집 완료 · 총 ${shipTotal}척`:'수집 실패';
  }catch(e){
    $('btn-ref').classList.remove('spin');
    $('h-dot').className='dot fail';
    $('h-status').textContent='서버 오류: '+e.message;
    TERMS_META.forEach(t=>{setBadge(t.id,'fail','오류');setMsg(t.id,'⚠️','서버 오류가 발생했습니다.',t.direct);onDone(false,0)});
  }
}
function renderResult(meta,res){
  const{status,vessels=[],elapsed,error}=res;
  const el=$(`elapsed-${meta.id}`);
  if(el)el.textContent=elapsed?`응답: ${elapsed}ms`:'';
  if(status==='live'&&vessels.length>0){setBadge(meta.id,'live',`✓ ${vessels.length}척`);setCards(meta.id,vessels);onDone(true,vessels.length)}
  else if(status==='empty'){setBadge(meta.id,'empty','조회 없음');setMsg(meta.id,'🔍','선박 정보를 가져오지 못했습니다.<br>공식 사이트에서 직접 확인하세요.',meta.direct);onDone(false,0)}
  else if(status==='nourl'){setBadge(meta.id,'empty','미개통');setMsg(meta.id,'🚧','공식 정보 서비스 URL이 아직 없습니다.',null);onDone(false,0)}
  else{setBadge(meta.id,'fail','수집 실패');setMsg(meta.id,'🔗',`스크래핑 실패<br><span style="font-size:9px;color:#1e3550">${safe(error||'')}</span>`,meta.direct);onDone(false,0)}
}
function onDone(isLive,ships){
  doneCount++;
  if(isLive){liveCount++;shipTotal+=ships}
  const pct=Math.round(doneCount/TERMS_META.length*100);
  $('s-live').textContent=liveCount;$('s-ship').textContent=shipTotal;$('s-prog').textContent=pct+'%';
  const pf=$('progress-fill');if(pf)pf.style.width=pct+'%';
}
function setBadge(id,cls,txt){const e=$(`badge-${id}`);if(e){e.className=`t-badge bg-${cls}`;e.textContent=txt}}
function setSkel(id){const e=$(`body-in-${id}`);if(e)e.innerHTML=skelHtml()}
function setMsg(id,ico,msg,link){
  const e=$(`body-in-${id}`);if(!e)return;
  e.innerHTML=`<div class="t-msg"><div class="m-ico">${ico}</div><p>${msg}</p>${link?`<a class="link-btn" href="${link}" target="_blank" rel="noopener">🌐 공식 사이트 바로가기 ↗</a>`:''}</div>`;
}
function setCards(id,vessels){
  const e=$(`body-in-${id}`);if(!e)return;
  e.innerHTML=vessels.map((v,i)=>{
    const chips=[
      v.owner&&v.owner!=='-'?`<span class="v-chip">🏢 ${safe(v.owner)}</span>`:'',
      v.berth&&v.berth!=='-'?`<span class="v-chip">⚓ ${safe(v.berth)}</span>`:'',
      v.status&&v.status!=='-'?`<span class="v-chip">📡 ${safe(v.status)}</span>`:'',
    ].filter(Boolean).join('');
    return`<div class="v-card" style="animation-delay:${i*35}ms">
      <div class="v-top"><div class="v-name">${safe(v.name)}</div>${v.vvd!=='-'?`<div class="v-vvd">${safe(v.vvd)}</div>`:''}</div>
      <div class="v-times">
        <div class="v-t"><div class="v-t-lbl">▼ 입항 ETA</div><div class="v-t-val">${safe(v.eta)}</div></div>
        <div class="v-t"><div class="v-t-lbl">▲ 출항 ETD</div><div class="v-t-val etd">${safe(v.etd)}</div></div>
      </div>${chips?`<div class="v-meta">${chips}</div>`:''}</div>`;
  }).join('');
}
function skelHtml(){return`<div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div><div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>`}
function toggleBlock(id){$(`hdr-${id}`)?.classList.toggle('open');$(`body-${id}`)?.classList.toggle('open')}
function toggleAuto(){autoOn=!autoOn;$('btn-auto').classList.toggle('on',autoOn);$('btn-auto').textContent=autoOn?'⏱ AUTO ON':'⏱ AUTO';autoOn?(autoTimer=setInterval(loadAll,60000)):clearInterval(autoTimer)}
function render(){
  const blocks=document.createElement('div');
  blocks.innerHTML=TERMS_META.map(t=>`
    <div class="t-block" id="block-${t.id}">
      <div class="t-hdr open" id="hdr-${t.id}" onclick="toggleBlock('${t.id}')">
        <div class="t-pill" style="color:${t.col};border-color:${t.col}25;background:${t.col}14">${t.name}</div>
        <div class="t-info"><div class="t-name">${t.full}</div><div class="t-pier">${t.pier}</div></div>
        <div class="t-badge bg-wait" id="badge-${t.id}">대기</div>
        <div class="t-chev">▾</div>
      </div>
      <div class="t-body open" id="body-${t.id}">
        <div class="t-elapsed" id="elapsed-${t.id}"></div>
        <div class="t-body-in" id="body-in-${t.id}">${skelHtml()}</div>
      </div>
    </div>`).join('')+`<p class="footer-note">캐시 60초 · AUTO 토글로 자동 새로고침 · 헤더 클릭으로 접기/펼치기</p>`;
  $('main').appendChild(blocks);
}
window.addEventListener('load',()=>{render();loadAll()});
</script>
</body>
</html>
