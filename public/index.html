<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 신항 실시간 선석 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--c1:#ffffff;--c2:#f8fafc;
    --bd:#e2e8f0;--tx:#1e293b;--mu:#94a3b8;
      --am:#f59e0b;--gr:#16a34a;--re:#dc2626;
        --sk:#0284c7;--pu:#7c3aed;
          --mono:'JetBrains Mono',monospace;
            --sans:'Noto Sans KR',sans-serif;
            }
            body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
            .app{max-width:520px;margin:0 auto}

            /* 헤더 */
            header{
              padding:16px;background:var(--c1);
                border-bottom:2px solid var(--bd);
                  position:sticky;top:0;z-index:50;
                    box-shadow:0 2px 8px rgba(0,0,0,.06);
                    }
                    .h-top{display:flex;justify-content:space-between;align-items:center}
                    .h-brand{display:flex;align-items:center;gap:10px}
                    .h-ico{font-size:24px}
                    .h-title{font-size:16px;font-weight:900;color:#0f172a;letter-spacing:-.3px}
                    .h-sub{font-size:11px;color:var(--mu);font-family:var(--mono);margin-top:2px}
                    .h-btns{display:flex;gap:6px;align-items:center}
                    .btn-ref{
                      width:36px;height:36px;border-radius:50%;
                        border:2px solid var(--bd);background:var(--c1);
                          color:var(--am);font-size:18px;cursor:pointer;
                            display:flex;align-items:center;justify-content:center;
                              box-shadow:0 1px 3px rgba(0,0,0,.08);
                              }
                              .btn-ref.spin{animation:spin .7s linear infinite}
                              @keyframes spin{to{transform:rotate(360deg)}}
                              .btn-auto{
                                border:2px solid var(--bd);background:var(--c1);
                                  color:var(--mu);font-size:11px;padding:5px 10px;
                                    border-radius:16px;cursor:pointer;font-family:var(--sans);
                                      font-weight:600;
                                      }
                                      .btn-auto.on{border-color:var(--am);color:var(--am);background:#fffbeb}

                                      /* 상태 바 */
                                      .status-bar{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--mu)}
                                      .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
                                      .dot.live{background:var(--gr);box-shadow:0 0 0 3px rgba(22,163,74,.15);animation:pulse 2s infinite}
                                      .dot.fail{background:var(--re)}
                                      @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(22,163,74,.15)}50%{box-shadow:0 0 0 6px rgba(22,163,74,.04)}}

                                      /* 집계 카드 */
                                      .summary{
                                        display:grid;grid-template-columns:repeat(4,1fr);
                                          gap:8px;margin-top:12px;
                                          }
                                          .sum-item{
                                            background:var(--c2);border:1px solid var(--bd);
                                              border-radius:10px;padding:10px 6px;text-align:center;
                                              }
                                              .sum-num{font-family:var(--mono);font-size:20px;font-weight:900;display:block}
                                              .sum-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;display:block;margin-top:2px}
                                              .planned-c .sum-num{color:var(--sk)} .planned-c .sum-lbl{color:var(--sk)}
                                              .berthed-c .sum-num{color:var(--am)} .berthed-c .sum-lbl{color:var(--am)}
                                              .working-c .sum-num{color:var(--gr)} .working-c .sum-lbl{color:var(--gr)}
                                              .departed-c .sum-num{color:var(--mu)} .departed-c .sum-lbl{color:var(--mu)}

                                              /* 메인 */
                                              main{padding:12px}
                                              .progress-bar{height:3px;background:var(--bd);margin-bottom:12px;border-radius:2px;overflow:hidden}
                                              .progress-fill{height:100%;background:var(--am);border-radius:2px;transition:width .4s;width:0%}

                                              /* 터미널 섹션 */
                                              .term-section{
                                                background:var(--c1);border:1px solid var(--bd);
                                                  border-radius:12px;margin-bottom:12px;overflow:hidden;
                                                    box-shadow:0 1px 4px rgba(0,0,0,.05);
                                                    }
                                                    .term-header{
                                                      display:flex;align-items:center;gap:10px;
                                                        padding:13px 14px;cursor:pointer;user-select:none;
                                                          border-bottom:1px solid var(--bd);
                                                            background:var(--c2);
                                                            }
                                                            .term-header:hover{background:#f1f5f9}
                                                            .term-pill{
                                                              font-family:var(--mono);font-size:11px;font-weight:700;
                                                                padding:4px 10px;border-radius:6px;border:2px solid;
                                                                  flex-shrink:0;min-width:52px;text-align:center;
                                                                  }
                                                                  .term-info{flex:1}
                                                                  .term-name{font-size:14px;font-weight:700;color:#0f172a}
                                                                  .term-pier{font-size:11px;color:var(--mu);margin-top:1px}
                                                                  .term-badge{
                                                                    font-size:10px;font-weight:700;padding:3px 9px;
                                                                      border-radius:12px;flex-shrink:0;border:1px solid;
                                                                      }
                                                                      .bg-loading{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}
                                                                      .bg-live{background:#dcfce7;color:#15803d;border-color:#86efac}
                                                                      .bg-fail{background:#fee2e2;color:#b91c1c;border-color:#fca5a5}
                                                                      .bg-empty{background:#f1f5f9;color:var(--mu);border-color:var(--bd)}
                                                                      .term-chevron{font-size:12px;color:var(--mu);transition:transform .3s;flex-shrink:0}
                                                                      .term-header.open .term-chevron{transform:rotate(180deg)}
                                                                      .term-body.collapsed{display:none}

                                                                      /* 선박 카드 */
                                                                      .vessel-card{
                                                                        margin:10px;border-radius:10px;
                                                                          border:1px solid var(--bd);overflow:hidden;
                                                                            box-shadow:0 1px 3px rgba(0,0,0,.04);
                                                                            }
                                                                            .vessel-status-bar{height:5px}
                                                                            .status-PLANNED .vessel-status-bar{background:var(--sk)}
                                                                            .status-BERTHED .vessel-status-bar{background:var(--am)}
                                                                            .status-WORKING .vessel-status-bar{background:var(--gr)}
                                                                            .status-DEPARTED .vessel-status-bar{background:#cbd5e1}

                                                                            .vessel-inner{padding:12px}
                                                                            .vessel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
                                                                            .vessel-name{font-size:15px;font-weight:900;color:#0f172a;line-height:1.3}
                                                                            .vessel-vvd{font-family:var(--mono);font-size:10px;color:var(--mu);margin-top:2px}

                                                                            .status-chip{
                                                                              font-size:11px;font-weight:800;padding:4px 10px;
                                                                                border-radius:12px;flex-shrink:0;border:1px solid;
                                                                                  white-space:nowrap;
                                                                                  }
                                                                                  .chip-PLANNED{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}
                                                                                  .chip-BERTHED{background:#fef3c7;color:#b45309;border-color:#fde68a}
                                                                                  .chip-WORKING{background:#dcfce7;color:#15803d;border-color:#86efac}
                                                                                  .chip-DEPARTED{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
                                                                                  .chip-UNKNOWN{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0}

                                                                                  .vessel-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
                                                                                  .v-cell{
                                                                                    background:var(--bg);border:1px solid var(--bd);
                                                                                      border-radius:8px;padding:8px 10px;
                                                                                      }
                                                                                      .v-lbl{font-size:9px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
                                                                                      .v-val{font-family:var(--mono);font-size:12px;font-weight:700;color:#0f172a}
                                                                                      .v-val.eta{color:var(--sk)}
                                                                                      .v-val.etd{color:#b45309}

                                                                                      .v-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
                                                                                      .v-chip{
                                                                                        font-size:10px;padding:3px 8px;border-radius:6px;
                                                                                          background:#f1f5f9;border:1px solid var(--bd);color:#475569;
                                                                                            font-weight:500;
                                                                                            }

                                                                                            /* 상태 메시지 */
                                                                                            .t-msg{
                                                                                              text-align:center;padding:24px;color:var(--mu);
                                                                                                font-size:13px;line-height:1.7;
                                                                                                }
                                                                                                .t-msg .ico{font-size:28px;margin-bottom:8px}

                                                                                                /* 스켈레톤 */
                                                                                                .skel{padding:10px 14px;border-bottom:1px solid var(--bd);animation:shim 1.5s infinite}
                                                                                                .sl{height:10px;background:var(--bd);border-radius:5px;margin-bottom:7px}
                                                                                                .sl.s{width:30%}.sl.m{width:55%}.sl.f{width:85%}
                                                                                                @keyframes shim{0%,100%{opacity:1}50%{opacity:.5}}
                                                                                                </style>
                                                                                                </head>
                                                                                                <body>
                                                                                                <div class="app">

                                                                                                <header>
                                                                                                  <div class="h-top">
                                                                                                      <div class="h-brand">
                                                                                                            <span class="h-ico">⚓</span>
                                                                                                                  <div>
                                                                                                                          <div class="h-title">부산 신항 실시간 선석 현황</div>
                                                                                                                                  <div class="h-sub" id="h-time">연결 중...</div>
                                                                                                                                        </div>
                                                                                                                                            </div>
                                                                                                                                                <div class="h-btns">
                                                                                                                                                      <button class="btn-auto" id="btn-auto" onclick="toggleAuto()">⏱ AUTO</button>
                                                                                                                                                            <button class="btn-ref" id="btn-ref" onclick="loadAll()">↻</button>
                                                                                                                                                                </div>
                                                                                                                                                                  </div>
                                                                                                                                                                    <div class="status-bar">
                                                                                                                                                                        <div class="dot" id="h-dot"></div>
                                                                                                                                                                            <span id="h-status">시스템 준비 중</span>
                                                                                                                                                                              </div>
                                                                                                                                                                                <div class="summary">
                                                                                                                                                                                    <div class="sum-item planned-c"><span class="sum-num" id="s-planned">-</span><span class="sum-lbl">PLANNED</span></div>
                                                                                                                                                                                        <div class="sum-item berthed-c"><span class="sum-num" id="s-berthed">-</span><span class="sum-lbl">BERTHED</span></div>
                                                                                                                                                                                            <div class="sum-item working-c"><span class="sum-num" id="s-working">-</span><span class="sum-lbl">WORKING</span></div>
                                                                                                                                                                                                <div class="sum-item departed-c"><span class="sum-num" id="s-departed">-</span><span class="sum-lbl">DEPARTED</span></div>
                                                                                                                                                                                                  </div>
                                                                                                                                                                                                  </header>

                                                                                                                                                                                                  <main>
                                                                                                                                                                                                    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                                                                                                                                                                                                      <div id="content"></div>
                                                                                                                                                                                                      </main>
                                                                                                                                                                                                      </div>

                                                                                                                                                                                                      <script>
                                                                                                                                                                                                      const TERMS=[
                                                                                                                                                                                                        {id:'pnit',name:'PNIT',full:'부산신항국제터미널',pier:'1부두',col:'#06b6d4'},
                                                                                                                                                                                                          {id:'pnc', name:'PNC', full:'부산신항만(주)',     pier:'2부두',col:'#3b82f6'},
                                                                                                                                                                                                            {id:'hjnc',name:'HJNC',full:'한진부산컨테이너',   pier:'3부두',col:'#f59e0b'},
                                                                                                                                                                                                              {id:'hpnt',name:'HPNT',full:'현대부산신항만',      pier:'4부두',col:'#10b981'},
                                                                                                                                                                                                                {id:'bnct',name:'BNCT',full:'(주)비엔씨티',       pier:'5부두',col:'#8b5cf6'},
                                                                                                                                                                                                                  {id:'bct', name:'BCT', full:'부산컨테이너터미널',  pier:'6부두',col:'#ef4444'},
                                                                                                                                                                                                                    {id:'dgt', name:'DGT', full:'동원글로벌터미널',    pier:'7부두',col:'#f97316'},
                                                                                                                                                                                                                      {id:'bnmt',name:'BNMT',full:'부산신항다목적터미널',pier:'다목적',col:'#64748b'},
                                                                                                                                                                                                                      ];

                                                                                                                                                                                                                      let autoTimer=null,autoOn=false;
                                                                                                                                                                                                                      const $=id=>document.getElementById(id);
                                                                                                                                                                                                                      const safe=s=>{const d=document.createElement('div');d.textContent=String(s||'-');return d.innerHTML};
                                                                                                                                                                                                                      const pad=n=>String(n).padStart(2,'0');
                                                                                                                                                                                                                      const fmtNow=()=>{const d=new Date();return`${pad(d.getHours())}:${pad(d.getMinutes())} 업데이트`};
                                                                                                                                                                                                                      const statusLabel=s=>({PLANNED:'입항예정',BERTHED:'접안중',WORKING:'작업중',DEPARTED:'출항완료'}[s]||s||'-');

                                                                                                                                                                                                                      function skelHtml(){
                                                                                                                                                                                                                        return`<div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>
                                                                                                                                                                                                                                 <div class="skel"><div class="sl s"></div><div class="sl m"></div><div class="sl f"></div></div>`;
                                                                                                                                                                                                                                 }

                                                                                                                                                                                                                                 function vesselHtml(vessels){
                                                                                                                                                                                                                                   return vessels.map(v=>{
                                                                                                                                                                                                                                       const sc=v.status||'UNKNOWN';
                                                                                                                                                                                                                                           const chips=[
                                                                                                                                                                                                                                                 v.owner&&v.owner!=='-'?`<span class="v-chip">🏢 ${safe(v.owner)}</span>`:'',
                                                                                                                                                                                                                                                       v.berth&&v.berth!=='-'?`<span class="v-chip">⚓ ${safe(v.berth)}</span>`:'',
                                                                                                                                                                                                                                                           ].filter(Boolean).join('');
                                                                                                                                                                                                                                                               return`<div class="vessel-card status-${sc}">
                                                                                                                                                                                                                                                                     <div class="vessel-status-bar"></div>
                                                                                                                                                                                                                                                                           <div class="vessel-inner">
                                                                                                                                                                                                                                                                                   <div class="vessel-top">
                                                                                                                                                                                                                                                                                             <div>
                                                                                                                                                                                                                                                                                                         <div class="vessel-name">${safe(v.name)}</div>
                                                                                                                                                                                                                                                                                                                     ${v.vvd&&v.vvd!=='-'?`<div class="vessel-vvd">VVD: ${safe(v.vvd)}</div>`:''}
                                                                                                                                                                                                                                                                                                                               </div>
                                                                                                                                                                                                                                                                                                                                         <div class="status-chip chip-${sc}">${statusLabel(sc)}</div>
                                                                                                                                                                                                                                                                                                                                                 </div>
                                                                                                                                                                                                                                                                                                                                                         <div class="vessel-grid">
                                                                                                                                                                                                                                                                                                                                                                   <div class="v-cell"><div class="v-lbl">▼ 입항예정 ETA</div><div class="v-val eta">${safe(v.eta)}</div></div>
                                                                                                                                                                                                                                                                                                                                                                             <div class="v-cell"><div class="v-lbl">▲ 출항예정 ETD</div><div class="v-val etd">${safe(v.etd)}</div></div>
                                                                                                                                                                                                                                                                                                                                                                                     </div>
                                                                                                                                                                                                                                                                                                                                                                                             ${chips?`<div class="v-meta">${chips}</div>`:''}
                                                                                                                                                                                                                                                                                                                                                                                                   </div>
                                                                                                                                                                                                                                                                                                                                                                                                       </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                         }).join('');
                                                                                                                                                                                                                                                                                                                                                                                                         }

                                                                                                                                                                                                                                                                                                                                                                                                         function buildSections(){
                                                                                                                                                                                                                                                                                                                                                                                                           $('content').innerHTML=TERMS.map(t=>`
                                                                                                                                                                                                                                                                                                                                                                                                               <div class="term-section" id="sec-${t.id}">
                                                                                                                                                                                                                                                                                                                                                                                                                     <div class="term-header open" onclick="toggleSec('${t.id}')">
                                                                                                                                                                                                                                                                                                                                                                                                                             <div class="term-pill" style="color:${t.col};border-color:${t.col};background:${t.col}18">${t.name}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                     <div class="term-info">
                                                                                                                                                                                                                                                                                                                                                                                                                                               <div class="term-name">${t.full}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                         <div class="term-pier">${t.pier}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                 </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                         <div class="term-badge bg-loading" id="badge-${t.id}">⟳ 수집중</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 <div class="term-chevron">▾</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             <div class="term-body" id="body-${t.id}">${skelHtml()}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 </div>`).join('');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 function toggleSec(id){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   document.querySelector(`#sec-${id} .term-header`).classList.toggle('open');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     $(`body-${id}`).classList.toggle('collapsed');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     async function loadAll(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       $('btn-ref').classList.add('spin');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         $('h-dot').className='dot';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           $('h-status').textContent='전체 부두 수집 중...';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             $('progress-fill').style.width='0%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               ['planned','berthed','working','departed'].forEach(k=>$(('s-'+k)).textContent='-');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 TERMS.forEach(t=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     const b=$(`badge-${t.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         if(b){b.className='term-badge bg-loading';b.textContent='⟳ 수집중';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             const bd=$(`body-${t.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if(bd) bd.innerHTML=skelHtml();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     try{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         const res=await (await fetch('/api/all')).json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             if(!res.ok) throw new Error('API 오류');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 let planned=0,berthed=0,working=0,departed=0,done=0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     res.data.forEach(item=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const b=$(`badge-${item.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 const bd=$(`body-${item.id}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       const vessels=item.vessels||[];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             if(b){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if(item.status==='live'){b.className='term-badge bg-live';b.textContent=`✓ ${vessels.length}척`;}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             else if(item.status==='fail'){b.className='term-badge bg-fail';b.textContent='수집차단';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     else if(item.status==='nourl'){b.className='term-badge bg-empty';b.textContent='준비중';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             else{b.className='term-badge bg-empty';b.textContent='정보없음';}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         if(bd){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if(item.status==='live'&&vessels.length){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           bd.innerHTML=vesselHtml(vessels);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     vessels.forEach(v=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if(v.status==='PLANNED')planned++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             else if(v.status==='BERTHED')berthed++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         else if(v.status==='WORKING')working++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     else if(v.status==='DEPARTED')departed++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       } else if(item.status==='fail'){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 bd.innerHTML=`<div class="t-msg"><div class="ico">🔗</div>외부 접근이 차단되어 수집할 수 없습니다.</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         } else if(item.status==='nourl'){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   bd.innerHTML=`<div class="t-msg"><div class="ico">🚧</div>준비 중입니다.</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     bd.innerHTML=`<div class="t-msg"><div class="ico">🔍</div>조회된 선박이 없습니다.</div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         done++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               $('progress-fill').style.width=(done/TERMS.length*100)+'%';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       $('s-planned').textContent=planned;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           $('s-berthed').textContent=berthed;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               $('s-working').textContent=working;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   $('s-departed').textContent=departed;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       $('h-dot').className='dot live';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           $('h-status').textContent=`${res.data.filter(d=>d.status==='live').length}개 부두 수집 완료`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               $('h-time').textContent=fmtNow();
