<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산 신항 실시간 선석표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--c1:#0c1d33;--c2:#0f2040;--bd:#1a3358;
  --tx:#c8ddf0;--mu:#3f607f;--am:#f5a623;--gr:#22c55e;
  --re:#f04444;--sk:#38bdf8;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
.app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{padding:18px 16px 14px;background:var(--c1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.h-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.h-brand{display:flex;align-items:center;gap:10px}
.h-ico{font-size:24px}
.h-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px}
.h-sub{font-size:10px;color:var(--mu);font-family:var(--mono);margin-top:2px}
.h-btns{display:flex;gap:7px;align-items:center}
.btn-auto{border:1px solid var(--bd);background:transparent;color:var(--mu);font-size:10px;padding:5px 9px;border-radius:14px;cursor:pointer;font-family:var(--sans);transition:all .2s;white-space:nowrap}
.btn-auto.on{border-color:var(--am);color:var(--am)}
.btn-ref{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:transparent;color:var(--am);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-ref:hover{background:var(--bd)}
.btn-ref.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.h-status{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:10px;color:var(--mu);font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mu);flex-shrink:0}
.dot.live{background:var(--gr);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite}
.dot.fail{background:var(--re)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 7px rgba(34,197,94,.04)}}
.h-stats{display:flex;margin-top:12px;background:var(--c2);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
.st-item{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--bd)}
.st-item:last-child{border-right:none}
.st-num{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--am);display:block}
.st-lbl{font-size:9px;color:var(--mu);display:block;margin-top:1px}
main{padding:12px 12px 40px}
.progress-bar{height:2px;background:var(--bd);margin-bottom:10px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--am);border-radius:2px;transition:width .4s ease;width:0%}
.v-card{background:var(--c1);border:1px solid var(--bd);border-radius:11px;padding:16px;margin-bottom:10px;animation:fadeUp .2s ease forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.v-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px}
.v-name{font-size:15px;font-weight:900;color:#fff;line-height:1.3}
.v-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:11px;flex-shrink:0;border:1px solid}
.v-status.working{background:rgba(34,197,94,.1);color:var(--gr);border-color:rgba(34,197,94,.2)}
.v-status.waiting{background:rgba(245,166,35,.1);color:var(--am);border-color:rgba(245,166,35,.2)}
.v-status.other{background:rgba(56,189,248,.1);color:var(--sk);border-color:rgba(56,189,248,.2)}
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.v-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:8px}
.v-cell{background:var(--c2);border:1px solid var(--bd);border-radius:7px;padding:8px 10px}
.v-cell-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.v-cell-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--sk)}
.v-cell-val.eta{color:var(--gr)}
.v-cell-val.etd{color:var(--am)}
.v-cell-val.ata{color:var(--tx)}
.v-cell-val.atd{color:var(--re)}
.v-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.v-chip{font-size:9px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--mu)}
.state-msg{text-align:center;padding:60px 20px;color:var(--mu)}
.state-msg .ico{font-size:40px;margin-bottom:16px}
.state-msg p{font-size:14px;line-height:1.7}
.skel{background:var(--c1);border:1px solid var(--bd);border-radius:11px;padding:16px;margin-bottom:10px;animation:shim 1.5s infinite}
.sl{height:10px;background:var(--bd);border-radius:5px;margin-bottom:8px}
.sl.s{width:30%}.sl.m{width:55%}.sl.f{width:90%}
@keyframes shim{0%,100%{opacity:1}50%{opacity:.4}}
.footer-note{font-size:10px;color:#1e3550;text-align:center;padding:6px 14px 0;line-height:1.7}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="h-top">
    <div class="h-brand">
      <span class="h-ico">⚓</span>
      <div>
        <div class="h-title">부산 신항 실시간 선석표</div>
        <div class="h-sub" id="h-time">PORT-MIS 연결 중...</div>
      </div>
    </div>
    <div class="h-btns">
      <button class="btn-auto" id="btn-auto" onclick="toggleAuto()">⏱ AUTO</button>
      <button class="btn-ref" id="btn-ref" onclick="loadData()" title="새로고침">↻</button>
    </div>
  </div>
  <div class="h-status">
    <div class="dot" id="h-dot"></div>
    <span id="h-status">시스템 준비 중</span>
  </div>
  <div class="h-stats">
    <div class="st-item"><span class="st-num" id="s-total">-</span><span class="st-lbl">전체 선박</span></div>
    <div class="st-item"><span class="st-num" id="s-working">-</span><span class="st-lbl">작업중</span></div>
    <div class="st-item"><span class="st-num" id="s-waiting">-</span><span class="st-lbl">대기중</span></div>
    <div class="st-item"><span class="st-num" id="s-elapsed">-</span><span class="st-lbl">응답(ms)</span></div>
  </div>
</header>
<main id="main">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="content"></div>
</main>
</div>
<script>
let autoTimer=null, autoOn=false;
const $=id=>document.getElementById(id);
const safe=s=>{const d=document.createElement('div');d.textContent=String(s||'-');return d.innerHTML};
const pad=n=>String(n).padStart(2,'0');
const fmtNow=()=>{const d=new Date();return`${pad(d.getHours())}:${pad(d.getMinutes())}`};

function statusClass(s) {
  if (!s||s==='-') return 'other';
  if (s.includes('작업')||s.includes('양하')||s.includes('적하')||s.includes('하역')) return 'working';
  if (s.includes('대기')||s.includes('입항')||s.includes('예정')) return 'waiting';
  return 'other';
}

async function loadData() {
  $('btn-ref').classList.add('spin');
  $('h-dot').className='dot';
  $('h-status').textContent='PORT-MIS 데이터 수집 중...';
  $('h-time').textContent='요청 중...';
  $('progress-fill').style.width='30%';
  $('content').innerHTML=skelHtml();

  try {
    const r = await fetch('/api/vessels');
    const res = await r.json();
    $('progress-fill').style.width='100%';

    if (!res.ok) throw new Error(res.error||'API 오류');

    const vessels = res.vessels || [];
    const working = vessels.filter(v=>statusClass(v.status)==='working').length;
    const waiting = vessels.filter(v=>statusClass(v.status)==='waiting').length;

    $('s-total').textContent   = vessels.length;
    $('s-working').textContent = working;
    $('s-waiting').textContent = waiting;
    $('s-elapsed').textContent = res.elapsed||'-';

    if (vessels.length === 0) {
      $('content').innerHTML = `
        <div class="state-msg">
          <div class="ico">🔍</div>
          <p>조회된 선박이 없습니다.<br>날짜 범위나 API 키를 확인하세요.</p>
        </div>`;
    } else {
      $('content').innerHTML = vessels.map((v,i) => {
        const sc = statusClass(v.status);
        const chips = [
          v.nationality&&v.nationality!=='-'?`<span class="v-chip">🌏 ${safe(v.nationality)}</span>`:'',
          v.operator&&v.operator!=='-'?`<span class="v-chip">🏢 ${safe(v.operator)}</span>`:'',
          v.cargo&&v.cargo!=='-'?`<span class="v-chip">📦 ${safe(v.cargo)}</span>`:'',
          v.callSign&&v.callSign!=='-'?`<span class="v-chip">📡 ${safe(v.callSign)}</span>`:'',
        ].filter(Boolean).join('');
        return `<div class="v-card" style="animation-delay:${i*30}ms">
          <div class="v-head">
            <div>
              <div class="v-name">${safe(v.vslNm)}</div>
              <div style="font-size:10px;color:var(--mu);margin-top:3px;font-family:var(--mono)">
                ${v.gtNs!=='-'?`${safe(v.gtNs)} GT`:''} ${v.berth!=='-'?`· 선석: ${safe(v.berth)}`:''}
              </div>
            </div>
            <div class="v-status ${sc}">${safe(v.status)}</div>
          </div>
          <div class="v-grid">
            <div class="v-cell"><div class="v-cell-lbl">▼ 입항예정 ETA</div><div class="v-cell-val eta">${safe(v.eta)}</div></div>
            <div class="v-cell"><div class="v-cell-lbl">▲ 출항예정 ETD</div><div class="v-cell-val etd">${safe(v.etd)}</div></div>
          </div>
          <div class="v-grid">
            <div class="v-cell"><div class="v-cell-lbl">✅ 실제입항 ATA</div><div class="v-cell-val ata">${safe(v.ata)}</div></div>
            <div class="v-cell"><div class="v-cell-lbl">🚢 실제출항 ATD</div><div class="v-cell-val atd">${safe(v.atd)}</div></div>
          </div>
          ${chips?`<div class="v-meta">${chips}</div>`:''}
        </div>`;
      }).join('');
    }

    $('h-dot').className='dot live';
    $('h-status').textContent=`PORT-MIS 연결 완료 · ${vessels.length}척 조회`;
    $('h-time').textContent=`${fmtNow()} 업데이트`;

  } catch(e) {
    $('content').innerHTML=`
      <div class="state-msg">
        <div class="ico">⚠️</div>
        <p>데이터 수집 실패<br><span style="font-size:11px;color:#3a5470">${safe(e.message)}</span></p>
      </div>`;
    $('h-dot').className='dot fail';
    $('h-status').textContent='연결 실패';
  } finally {
    $('btn-ref').classList.remove('spin');
    setTimeout(()=>{ $('progress-fill').style.width='0%'; }, 1000);
  }
}

function skelHtml() {
  return Array(4).fill(0).map(()=>`
    <div class="skel">
      <div class="sl s"></div><div class="sl m"></div>
      <div class="sl f"></div><div class="sl f"></div>
    </div>`).join('');
}

function toggleAuto() {
  autoOn=!autoOn;
  $('btn-auto').classList.toggle('on',autoOn);
  $('btn-auto').textContent=autoOn?'⏱ AUTO ON':'⏱ AUTO';
  autoOn?(autoTimer=setInterval(loadData,60000)):clearInterval(autoTimer);
}

window.addEventListener('load', loadData);
</script>
</body>
</html>
